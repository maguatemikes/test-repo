# CI/CD pipeline for the CRM web app.
# Runs on the self-hosted GitLab Runner on the app server.

stages:
  - install
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/
    - node_modules/

.node:
  image: node:20-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@9.12.1 --activate
    - pnpm config set store-dir .pnpm-store

install:
  extends: .node
  stage: install
  script:
    - pnpm install --frozen-lockfile || pnpm install

typecheck:
  extends: .node
  stage: test
  needs: [install]
  script:
    - pnpm typecheck

lint:
  extends: .node
  stage: test
  needs: [install]
  script:
    - pnpm lint
  allow_failure: true

build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs: [typecheck]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image: alpine:3.19
  needs: [build-image]
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd /opt/crm && docker compose pull crm-web && docker compose up -d crm-web && docker image prune -f"
  environment:
    name: production
    url: https://crm.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
