# CI/CD pipeline for the CRM web app.
# Runs on the self-hosted GitLab Runner on the app server (163.245.212.5).

stages:
  - test
  - deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

install-and-test:
  image: node:20-alpine
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline --no-audit --progress=false
    - npm run lint

deploy-staging:
  stage: deploy
  image: docker:24
  tags:
    - vps
  needs: ["install-and-test"]
  script:
    - echo "Building Docker image..."
    - docker build -t crm-web-staging:latest .
    - echo "Stopping old container if running..."
    - docker stop crm-web-staging 2>/dev/null || true
    - docker rm crm-web-staging 2>/dev/null || true
    - echo "Starting new container..."
    # Inject DATABASE_URL from a GitLab CI/CD variable when present (overrides the
    # env-file). Keeps the secret out of the repo and the server file.
    - |
      EXTRA_ENV=""
      if [ -n "$DATABASE_URL" ]; then EXTRA_ENV="-e DATABASE_URL=$DATABASE_URL"; fi
      docker run -d --name crm-web-staging --restart=unless-stopped \
        -p 127.0.0.1:3050:3000 \
        --env-file /opt/crm-staging/.env $EXTRA_ENV \
        crm-web-staging:latest
    - echo "Cleaning up unused images..."
    - docker image prune -f
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"